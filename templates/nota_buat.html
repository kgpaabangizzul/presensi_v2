{% extends 'layout.html' %}
{% block page_title %}Buat Nota Dinas{% endblock %}
{% block content %}
<div style="max-width:640px;margin:0 auto">
  <div class="card" style="padding:24px">

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <a href="/nota-dinas" style="color:#64748b;text-decoration:none;font-size:20px">←</a>
      <h2 style="font-size:16px;font-weight:800;color:#1e293b;margin:0">📄 Buat Nota Dinas</h2>
    </div>

    <form method="POST" enctype="multipart/form-data" style="display:flex;flex-direction:column;gap:16px">

      <!-- Kepada -->
      <div>
        <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">Kepada (YTH)</label>
        <input type="text" name="kepada" class="input-field" placeholder="Contoh: Karumkit" required style="font-size:14px">
      </div>

      <!-- Perihal -->
      <div>
        <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">Perihal</label>
        <input type="text" name="perihal" class="input-field" placeholder="Contoh: Pengajuan Pengadaan TV LED" required style="font-size:14px">
      </div>

      <!-- Judul (internal) -->
      <div>
        <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">Judul Nota <span style="font-weight:400;color:#94a3b8">(untuk referensi internal)</span></label>
        <input type="text" name="judul" class="input-field" placeholder="Contoh: Nota Pengajuan Pengadaan Peralatan IT" required style="font-size:14px">
      </div>

      <!-- DASAR SURAT -->
      <div style="border:1.5px solid #e2e8f0;border-radius:14px;padding:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <label style="font-size:13px;font-weight:700;color:#374151">📋 Dasar Surat</label>
          <button type="button" onclick="tambahDasar()"
            style="font-size:12px;background:#eff6ff;color:#2563eb;border:none;padding:5px 12px;border-radius:8px;font-weight:600;cursor:pointer">
            + Tambah Poin
          </button>
        </div>
        <div id="dasarList" style="display:flex;flex-direction:column;gap:8px">
          <!-- Poin awal -->
          <div class="dasar-item" style="display:flex;gap:8px;align-items:flex-start">
            <span style="font-size:13px;font-weight:600;color:#64748b;padding-top:8px;flex-shrink:0;width:16px">a.</span>
            <textarea name="dasar_item" rows="2" class="input-field"
              placeholder="Contoh: Pemenuhan kebutuhan sarana dan prasarana guna mendukung layanan Rumah Sakit"
              style="flex:1;resize:vertical;font-size:13px;line-height:1.5"></textarea>
            <button type="button" onclick="hapusDasar(this)"
              style="font-size:16px;background:none;border:none;color:#ef4444;cursor:pointer;padding:6px;flex-shrink:0" title="Hapus">✕</button>
          </div>
        </div>
        <input type="hidden" name="dasar" id="dasarHidden">
        <p style="font-size:11px;color:#94a3b8;margin-top:8px">Setiap poin akan menjadi sub-butir (a, b, c...) di PDF</p>
      </div>

      <!-- ISI SURAT -->
      <div>
        <label style="display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:6px">📝 Isi / Uraian Surat</label>
        <textarea name="isi" rows="6" class="input-field" required
          placeholder="Sehubungan dengan dasar di atas, mohon Karumkit berkenan mendukung kebutuhan peralatan..."
          style="resize:vertical;font-size:13px;line-height:1.6"></textarea>
        <p style="font-size:11px;color:#94a3b8;margin-top:4px">Tulis isi/uraian nota. Enter = paragraf baru di PDF.</p>
      </div>

      <!-- Lampiran -->
      <div>
        <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">📎 Lampiran <span style="font-weight:400;color:#94a3b8">(opsional — gambar/PDF)</span></label>
        <input type="file" name="lampiran" accept=".png,.jpg,.jpeg,.gif,.pdf"
          style="width:100%;padding:8px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;box-sizing:border-box">
      </div>

      <!-- Submit -->
      <div style="display:flex;gap:10px;padding-top:4px">
        <a href="/nota-dinas"
          style="flex:1;text-align:center;border:1.5px solid #e2e8f0;color:#64748b;padding:12px;border-radius:12px;font-size:14px;font-weight:600;text-decoration:none">
          Batal
        </a>
        <button type="submit" class="btn-primary" style="flex:2;padding:12px;font-size:14px" onclick="submitForm()">
          Kirim Nota Dinas
        </button>
      </div>

    </form>
  </div>
</div>

<script>
var huruf = ['a','b','c','d','e','f','g','h','i','j'];

function updateHuruf() {
  var items = document.querySelectorAll('.dasar-item');
  items.forEach(function(item, i) {
    var lbl = item.querySelector('span');
    if (lbl) lbl.textContent = (huruf[i] || (i+1)) + '.';
  });
}

function tambahDasar() {
  var list = document.getElementById('dasarList');
  var idx = list.children.length;
  var div = document.createElement('div');
  div.className = 'dasar-item';
  div.style.cssText = 'display:flex;gap:8px;align-items:flex-start';
  div.innerHTML =
    '<span style="font-size:13px;font-weight:600;color:#64748b;padding-top:8px;flex-shrink:0;width:16px">' +
    (huruf[idx] || (idx+1)) + '.</span>' +
    '<textarea name="dasar_item" rows="2" class="input-field" ' +
    'placeholder="Poin dasar surat..." ' +
    'style="flex:1;resize:vertical;font-size:13px;line-height:1.5"></textarea>' +
    '<button type="button" onclick="hapusDasar(this)" ' +
    'style="font-size:16px;background:none;border:none;color:#ef4444;cursor:pointer;padding:6px;flex-shrink:0">✕</button>';
  list.appendChild(div);
  div.querySelector('textarea').focus();
}

function hapusDasar(btn) {
  var items = document.querySelectorAll('.dasar-item');
  if (items.length <= 1) { alert('Minimal 1 poin dasar surat.'); return; }
  btn.closest('.dasar-item').remove();
  updateHuruf();
}

function submitForm() {
  // Gabungkan semua poin dasar jadi 1 string, pisah newline
  var items = document.querySelectorAll('[name="dasar_item"]');
  var lines = [];
  items.forEach(function(ta) {
    var v = ta.value.trim();
    if (v) lines.push(v);
  });
  document.getElementById('dasarHidden').value = lines.join('\n');
}
</script>
{% endblock %}
